<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 Azureサービス マップ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d45;
    --azure: #0078d4;
    --azure-light: #50b0f0;
    --azure-glow: rgba(0,120,212,0.18);
    --text: #e8edf5;
    --muted: #7a8ba3;
    --accent: #00d4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  header { text-align: center; margin-bottom: 32px; }

  .logo-badge {
    display: inline-block;
    background: var(--azure-glow);
    border: 1px solid var(--azure);
    border-radius: 6px;
    padding: 4px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--azure-light);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  h1 { font-size: clamp(20px, 4vw, 32px); font-weight: 700; letter-spacing: -0.02em; }
  h1 span { color: var(--azure-light); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .search-wrap { max-width: 400px; margin: 20px auto; position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--azure); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 28px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    padding: 4px 10px; border-radius: 20px; border: 1px solid transparent; transition: all 0.2s;
  }
  .legend-item:hover { border-color: var(--border); color: var(--text); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .tree { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  .root-node {
    background: linear-gradient(135deg, #0050a0, #0078d4);
    border-radius: 12px; padding: 18px 24px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 0 32px rgba(0,120,212,0.3); margin-bottom: 8px;
  }
  .root-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .root-label { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .root-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }

  .category { border-radius: 10px; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s; }
  .category.hidden { display: none; }

  .cat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.2s;
  }
  .cat-header:hover { background: rgba(255,255,255,0.03); }
  .cat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .cat-title { flex: 1; }
  .cat-name { font-size: 15px; font-weight: 600; }
  .cat-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .cat-toggle { font-size: 12px; color: var(--muted); transition: transform 0.3s; }
  .category.open .cat-toggle { transform: rotate(180deg); }
  .cat-body { padding: 0 18px 14px 18px; display: none; }
  .category.open .cat-body { display: block; }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px; margin-top: 4px;
  }

  /* ── Flat service card ── */
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .service-card:hover { border-color: var(--azure); background: var(--azure-glow); transform: translateY(-1px); }
  .service-card.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .svc-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .svc-jp { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .svc-tag {
    display: inline-block; font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 6px; border-radius: 3px; margin-top: 5px;
    letter-spacing: 0.05em;
  }
  .svc-tap-hint { position: absolute; top: 8px; right: 8px; font-size: 10px; color: var(--muted); opacity: 0.6; }

  /* ── Service group (parent + children) ── */
  .service-group {
    grid-column: 1 / -1;
    border: 1px solid;
    border-radius: 10px;
    overflow: hidden;
  }
  .service-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .service-group-header:hover { background: rgba(255,255,255,0.03); }
  .service-group-header .svc-name { font-size: 14px; }
  .group-badge {
    font-size: 9px; font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px; border-radius: 3px; letter-spacing: 0.05em;
    margin-top: 5px; display: inline-block;
  }
  .group-child-count {
    font-size: 10px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .group-tap-hint { font-size: 10px; color: var(--muted); opacity: 0.7; flex-shrink: 0; }

  .service-group-children {
    padding: 8px 10px 10px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 6px;
  }

  /* Child card (inside a group) */
  .service-card.service-child {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    padding: 8px 10px;
  }
  .service-card.service-child .svc-name { font-size: 12px; }
  .service-card.service-child .svc-jp  { font-size: 10px; }
  .service-card.service-child .svc-tag { font-size: 8px; }
  .service-card.service-child:hover { background: var(--azure-glow); border-color: var(--azure); }
  .service-card.service-child.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .connector { width: 2px; height: 20px; background: linear-gradient(to bottom, var(--azure), transparent); margin: 0 auto; }
  .no-result { text-align: center; color: var(--muted); padding: 40px; display: none; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #131c2e; border: 1px solid var(--border);
    border-radius: 16px; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: modalIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .modal-cat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .modal-titles { flex: 1; }
  .modal-svc-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .modal-svc-jp { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; margin-top: -2px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 18px; }
  .modal-section-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .modal-oneliner { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--text); }
  .keyword-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .keyword-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid; }
  .exam-tip-box { background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.25); border-radius: 10px; padding: 12px 14px; }
  .exam-tip-label { font-size: 10px; color: #f9c700; letter-spacing: 0.08em; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .exam-tip-text { font-size: 13px; color: #e0d0a0; line-height: 1.55; }
  .modal-divider { height: 1px; background: var(--border); }

  @media (max-width: 600px) {
    .services-grid { grid-template-columns: 1fr 1fr; }
    .service-group-children { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">AZ-900 AZURE FUNDAMENTALS</div>
  <h1>Azure <span>サービス</span> マップ</h1>
  <p class="subtitle">カテゴリをタップして展開 · サービス名をタップで詳細表示 · ▶マークは子サービスあり</p>
</header>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="サービス名で検索（例: VM, Monitor...）">
</div>

<div class="legend" id="legend"></div>
<div class="connector"></div>

<div class="tree" id="tree">
  <div class="root-node">
    <div class="root-icon">☁️</div>
    <div>
      <div class="root-label">Microsoft Azure</div>
      <div class="root-sub">クラウドプラットフォーム — AZ-900出題範囲</div>
    </div>
  </div>
  <div class="connector"></div>
</div>

<div class="no-result" id="noResult">🔍 該当するサービスが見つかりませんでした</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat-icon" id="mCatIcon"></div>
      <div class="modal-titles">
        <div class="modal-svc-name" id="mName"></div>
        <div class="modal-svc-jp" id="mJp"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-label">💡 一言で言うと</div>
        <div class="modal-oneliner" id="mOneliner"></div>
      </div>
      <div class="modal-divider"></div>
      <div>
        <div class="modal-section-label">🔑 試験に出るキーワード</div>
        <div class="keyword-grid" id="mKeywords"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="exam-tip-box">
        <div class="exam-tip-label">📝 EXAM TIP</div>
        <div class="exam-tip-text" id="mExamTip"></div>
      </div>
    </div>
  </div>
</div>

<script>

// ── Legend ──
const legend = document.getElementById('legend');
categories.forEach(cat => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${cat.color}"></span>${cat.icon} ${cat.name}`;
  item.addEventListener('click', () => {
    const el = document.getElementById('cat-' + cat.id);
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (!el.classList.contains('open')) el.querySelector('.cat-header').click();
  });
  legend.appendChild(item);
});

// ── Card factories ──
function createServiceCard(svc, cat, isChild = false) {
  const card = document.createElement('div');
  card.className = 'service-card' + (isChild ? ' service-child' : '');
  card.dataset.name = svc.name.toLowerCase();
  card.dataset.jp   = svc.jp;
  card.innerHTML = `
    <span class="svc-tap-hint">▶</span>
    <div class="svc-name">${svc.name}</div>
    <div class="svc-jp">${svc.jp}</div>
    <span class="svc-tag" style="background:${cat.color}22;color:${cat.color}">${svc.tag}</span>
  `;
  card.addEventListener('click', () => openModal(svc, cat));
  return card;
}

function createGroupCard(svc, cat) {
  const group = document.createElement('div');
  group.className = 'service-group';
  group.style.borderColor = cat.color + '55';
  group.dataset.name = svc.name.toLowerCase();
  group.dataset.jp   = svc.jp;

  // Header (click → modal for parent)
  const header = document.createElement('div');
  header.className = 'service-group-header';
  header.style.background = cat.color + '12';
  header.innerHTML = `
    <div style="flex:1">
      <div class="svc-name" style="color:${cat.color}">${svc.name}</div>
      <div class="svc-jp">${svc.jp}</div>
      <span class="group-badge" style="background:${cat.color}22;color:${cat.color}">${svc.tag}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span class="group-child-count">▼ ${svc.children.length}サービスを含む</span>
      <span class="group-tap-hint">詳細 ▶</span>
    </div>
  `;
  header.addEventListener('click', () => openModal(svc, cat));
  group.appendChild(header);

  // Children grid
  const childGrid = document.createElement('div');
  childGrid.className = 'service-group-children';
  svc.children.forEach(child => {
    childGrid.appendChild(createServiceCard(child, cat, true));
  });
  group.appendChild(childGrid);

  return group;
}

// ── Tree ──
const tree = document.getElementById('tree');
categories.forEach((cat, i) => {
  const catDiv = document.createElement('div');
  catDiv.className = 'category';
  catDiv.id = 'cat-' + cat.id;

  // Category header
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.innerHTML = `
    <div class="cat-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
    <div class="cat-title">
      <div class="cat-name" style="color:${cat.color}">${cat.name}</div>
      <div class="cat-desc">${cat.desc}</div>
    </div>
    <div class="cat-toggle">▼</div>
  `;
  header.addEventListener('click', () => catDiv.classList.toggle('open'));
  catDiv.appendChild(header);

  // Category body
  const body = document.createElement('div');
  body.className = 'cat-body';
  const grid = document.createElement('div');
  grid.className = 'services-grid';

  cat.services.forEach(svc => {
    grid.appendChild(svc.isGroup ? createGroupCard(svc, cat) : createServiceCard(svc, cat));
  });

  body.appendChild(grid);
  catDiv.appendChild(body);
  tree.appendChild(catDiv);

  if (i < categories.length - 1) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    tree.appendChild(conn);
  }
});

// Open first category by default
document.querySelectorAll('.category')[0].classList.add('open');

// ── Modal ──
const overlay = document.getElementById('modalOverlay');

function openModal(svc, cat) {
  document.getElementById('mCatIcon').textContent = cat.icon;
  document.getElementById('mCatIcon').style.background = cat.color + '30';
  document.getElementById('mName').textContent = svc.name;
  document.getElementById('mName').style.color = cat.color;
  document.getElementById('mJp').textContent = svc.jp;
  document.getElementById('mOneliner').textContent = svc.oneliner;

  const kGrid = document.getElementById('mKeywords');
  kGrid.innerHTML = '';
  svc.keywords.forEach(kw => {
    const chip = document.createElement('span');
    chip.className = 'keyword-chip';
    chip.textContent = kw;
    chip.style.background = cat.color + '18';
    chip.style.borderColor = cat.color + '60';
    chip.style.color = cat.color;
    kGrid.appendChild(chip);
  });

  document.getElementById('mExamTip').textContent = svc.examTip;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Search ──
const searchInput = document.getElementById('searchInput');
const noResult    = document.getElementById('noResult');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  let anyVisible = false;

  categories.forEach(cat => {
    const catEl = document.getElementById('cat-' + cat.id);
    let catHasMatch = false;

    // Standalone cards (direct children of grid, not inside a group)
    catEl.querySelectorAll('.services-grid > .service-card').forEach(card => {
      const match = !q || card.dataset.name.includes(q) || card.dataset.jp.includes(q);
      card.style.display = match ? '' : 'none';
      card.classList.toggle('highlight', !!(q && match));
      if (match) catHasMatch = true;
    });

    // Groups
    catEl.querySelectorAll('.service-group').forEach(group => {
      const groupMatch = !q || group.dataset.name.includes(q) || group.dataset.jp.includes(q);
      let childMatch = false;

      group.querySelectorAll('.service-card.service-child').forEach(child => {
        const match = !q || child.dataset.name.includes(q) || child.dataset.jp.includes(q);
        // If parent group matches, show all children; otherwise filter individually
        const show = !q || groupMatch || match;
        child.style.display = show ? '' : 'none';
        child.classList.toggle('highlight', !!(q && match));
        if (match) childMatch = true;
      });

      const visible = !q || groupMatch || childMatch;
      group.style.display = visible ? '' : 'none';
      if (visible) catHasMatch = true;
    });

    catEl.classList.toggle('hidden', !catHasMatch);
    if (catHasMatch && q) catEl.classList.add('open');
    if (catHasMatch) anyVisible = true;
  });

  noResult.style.display = anyVisible ? 'none' : 'block';

  if (!q) {
    document.querySelectorAll('.service-card, .service-group').forEach(el => {
      el.style.display = '';
      el.classList.remove('highlight');
    });
    document.querySelectorAll('.category').forEach(c => c.classList.remove('hidden'));
    noResult.style.display = 'none';
  }
});
</script>
